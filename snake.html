<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A beautifully designed Snake game with stunning visuals and smooth animations." />
    <title>Snake — Play Now</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Animated background orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="game-container snake-container">
        <!-- Header -->
        <header class="header">
            <div class="game-switch">
                <a href="index.html" class="switch-link">
                    <span class="switch-icon">✕</span> Play Tic Tac Toe
                </a>
            </div>
            <h1 class="title">
                <span class="title-icon">🐍</span>
                Snake
            </h1>
            <p class="subtitle">Eat apples and grow your snake!</p>
        </header>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-card score-current">
                <span class="score-symbol">🍎</span>
                <span class="score-name">Score</span>
                <span class="score-value" id="scoreValue">0</span>
            </div>
            <div class="score-card score-high">
                <span class="score-symbol">🏆</span>
                <span class="score-name">High Score</span>
                <span class="score-value" id="highScoreValue">0</span>
            </div>
        </div>

        <!-- Game Board -->
        <div class="board-wrapper snake-board-wrapper">
            <canvas id="snakeCanvas" width="400" height="400" class="snake-canvas"></canvas>

            <!-- Pause/Start overlay -->
            <div class="snake-overlay hidden" id="snakeOverlay">
                <h2 class="overlay-title" id="overlayTitle">Paused</h2>
                <p class="overlay-sub" id="overlaySub">Press Space to continue</p>
            </div>
        </div>

        <!-- Controls (Mobile D-pad) -->
        <div class="mobile-controls">
            <button class="dpad-btn up" data-dir="up">▲</button>
            <div class="dpad-row">
                <button class="dpad-btn left" data-dir="left">◀</button>
                <button class="dpad-btn down" data-dir="down">▼</button>
                <button class="dpad-btn right" data-dir="right">▶</button>
            </div>
        </div>

        <!-- Result Overlay -->
        <div class="result-overlay hidden" id="resultOverlay">
            <div class="result-card">
                <div class="result-emoji" id="resultEmoji">💥</div>
                <h2 class="result-title" id="resultTitle">Game Over!</h2>
                <p class="result-sub" id="resultSub">Score: 0</p>
                <button class="btn-play-again" id="btnPlayAgain">Try Again</button>
            </div>
        </div>
    </div>

    <script src="snake.js"></script>
</body>

</html>
